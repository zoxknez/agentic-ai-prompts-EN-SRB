name: Validate prompts

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Validate prompt structure
        run: node scripts/validate-prompts.js

      - name: Check CHANGELOG mentions VERSION
        run: |
          VERSION=$(cat prompts/VERSION | tr -d '\n')
          if ! grep -q "\[$VERSION\]" CHANGELOG.md; then
            echo "CHANGELOG.md missing section for prompts/VERSION ($VERSION)"
            exit 1
          fi
